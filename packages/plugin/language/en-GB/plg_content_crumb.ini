; Crumb content plugin — frontend language strings
; Note: All ini files need to be saved as UTF-8

PLG_CONTENT_CRUMB="Content - Crumb"
PLG_CONTENT_CRUMB_XML_DESCRIPTION="Embeds the Crumb BMLT meeting finder widget in articles via the {crumb …} shortcode."

PLG_CONTENT_CRUMB_FIELD_SERVER_LABEL="BMLT Server URL"
PLG_CONTENT_CRUMB_FIELD_SERVER_DESC="Required. The full URL to your BMLT server (e.g. https://your-server/main_server)."

PLG_CONTENT_CRUMB_FIELD_SERVICE_BODY_LABEL="Service Body IDs"
PLG_CONTENT_CRUMB_FIELD_SERVICE_BODY_DESC="Optional. Single ID or comma-separated list. Leave empty to show all meetings. Child service bodies are always included."

PLG_CONTENT_CRUMB_FIELD_FORMAT_IDS_LABEL="Format IDs"
PLG_CONTENT_CRUMB_FIELD_FORMAT_IDS_DESC="Optional. Single ID or comma-separated list of BMLT format IDs to lock the widget to. Leave empty to show all formats. Can be overridden per shortcode via format_ids=&quot;17,54&quot;."

PLG_CONTENT_CRUMB_FIELD_VIEW_LABEL="Default View"
PLG_CONTENT_CRUMB_FIELD_VIEW_DESC="Optional. Sets the default view when the widget loads. Can be overridden per shortcode and via the ?view= query parameter."
PLG_CONTENT_CRUMB_FIELD_VIEW_DEFAULT="— Widget Default (list) —"
PLG_CONTENT_CRUMB_FIELD_VIEW_LIST="List"
PLG_CONTENT_CRUMB_FIELD_VIEW_MAP="Map"

PLG_CONTENT_CRUMB_FIELD_CSS_TEMPLATE_LABEL="CSS Template"
PLG_CONTENT_CRUMB_FIELD_CSS_TEMPLATE_DESC="Full Width fits the content area. Full Width (Force Viewport) breaks out to span the full browser width."
PLG_CONTENT_CRUMB_FIELD_CSS_TEMPLATE_NONE="— None —"
PLG_CONTENT_CRUMB_FIELD_CSS_TEMPLATE_FW="Full Width"
PLG_CONTENT_CRUMB_FIELD_CSS_TEMPLATE_FW_FORCE="Full Width (Force Viewport)"

PLG_CONTENT_CRUMB_FIELD_GEOLOCATION_RADIUS_LABEL="Geolocation Radius"
PLG_CONTENT_CRUMB_FIELD_GEOLOCATION_RADIUS_DESC="Optional. Geolocation search radius. Positive integer = fixed radius in miles (or km per server settings). Negative integer = BMLT auto-radius (e.g. -50 finds ~50 nearby meetings). Leave empty to use the widget default (-50). Can be overridden per shortcode via geolocation_radius=&quot;-50&quot;. Ignored if geolocationRadius is already set in Widget Configuration JSON."

PLG_CONTENT_CRUMB_FIELD_BASE_PATH_LABEL="Base Path for Pretty URLs"
PLG_CONTENT_CRUMB_FIELD_BASE_PATH_DESC="Optional. The path where the widget lives (e.g. <code>meetings</code>). Enables clean URLs like <code>/meetings/monday-night-meeting-42</code> instead of hash-based routing."

PLG_CONTENT_CRUMB_FIELD_WIDGET_CONFIG_LABEL="Widget Configuration (JSON)"
PLG_CONTENT_CRUMB_FIELD_WIDGET_CONFIG_DESC="Optional. CrumbWidgetConfig in JSON format. See https://crumb.bmlt.app/ for available options."
