; Crumb module — frontend language strings
; Note: All ini files need to be saved as UTF-8

MOD_CRUMB="Crumb"
MOD_CRUMB_XML_DESCRIPTION="Renders the Crumb BMLT meeting finder widget in any module position."

MOD_CRUMB_FIELD_SERVER_LABEL="BMLT Server URL"
MOD_CRUMB_FIELD_SERVER_DESC="Required. The full URL to your BMLT server (e.g. https://your-server/main_server)."

MOD_CRUMB_FIELD_SERVICE_BODY_LABEL="Service Body IDs"
MOD_CRUMB_FIELD_SERVICE_BODY_DESC="Optional. Single ID or comma-separated list. Leave empty to show all meetings. Child service bodies are always included."

MOD_CRUMB_FIELD_FORMAT_IDS_LABEL="Format IDs"
MOD_CRUMB_FIELD_FORMAT_IDS_DESC="Optional. Single ID or comma-separated list of BMLT format IDs to lock the widget to. Leave empty to show all formats."

MOD_CRUMB_FIELD_VIEW_LABEL="Default View"
MOD_CRUMB_FIELD_VIEW_DESC="Optional. Sets the default view when the widget loads."
MOD_CRUMB_FIELD_VIEW_DEFAULT="— Widget Default (list) —"
MOD_CRUMB_FIELD_VIEW_LIST="List"
MOD_CRUMB_FIELD_VIEW_MAP="Map"

MOD_CRUMB_FIELD_CSS_TEMPLATE_LABEL="CSS Template"
MOD_CRUMB_FIELD_CSS_TEMPLATE_DESC="Full Width fits the content area. Full Width (Force Viewport) breaks out to span the full browser width."
MOD_CRUMB_FIELD_CSS_TEMPLATE_NONE="— None —"
MOD_CRUMB_FIELD_CSS_TEMPLATE_FW="Full Width"
MOD_CRUMB_FIELD_CSS_TEMPLATE_FW_FORCE="Full Width (Force Viewport)"

MOD_CRUMB_FIELD_GEOLOCATION_RADIUS_LABEL="Geolocation Radius"
MOD_CRUMB_FIELD_GEOLOCATION_RADIUS_DESC="Optional. Geolocation search radius. Positive integer = fixed radius in miles (or km per server settings). Negative integer = BMLT auto-radius (e.g. -50 finds ~50 nearby meetings). Leave empty to use the widget default (-50). Ignored if geolocationRadius is already set in Widget Configuration JSON."

MOD_CRUMB_FIELD_BASE_PATH_LABEL="Base Path for Pretty URLs"
MOD_CRUMB_FIELD_BASE_PATH_DESC="Optional. The path where the widget lives (e.g. <code>meetings</code>). Enables clean URLs without the # fragment."

MOD_CRUMB_FIELD_UPDATE_URL_LABEL="Update Meeting URL"
MOD_CRUMB_FIELD_UPDATE_URL_DESC="Optional. URL template for the &quot;Update Meeting Info&quot; link shown at the bottom of the meeting detail panel. Supported tokens (URL-encoded on substitution): <code>{meeting_id}</code>, <code>{meeting_name}</code>, <code>{server_url}</code>, <code>{return_url}</code>. Works with bmlt-workflow, any hosted form, or a <code>mailto:</code> URL. Leave empty to hide the link."

MOD_CRUMB_FIELD_WIDGET_CONFIG_LABEL="Widget Configuration (JSON)"
MOD_CRUMB_FIELD_WIDGET_CONFIG_DESC="Optional. CrumbWidgetConfig in JSON format. See https://crumb.bmlt.app/ for available options."
