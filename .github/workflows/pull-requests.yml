name: "pull-request"

on:
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code 🛒
        uses: actions/checkout@v6

      - name: Setup PHP 🐫
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer

      - name: Install dependencies 📦
        run: composer install --prefer-dist --no-progress

      - name: Linter 🧹
        run: make lint

      - name: PHP syntax check 🔍
        run: |
          set -e
          find packages -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: XML well-formedness 📑
        run: |
          set -e
          for f in pkg_crumb.xml packages/plugin/crumb.xml packages/module/mod_crumb.xml; do
            xmllint --noout "$f"
          done

  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php-version: ["8.2", "8.3", "8.4"]
    steps:
      - name: Check out code 🛒
        uses: actions/checkout@v6

      - name: Setup PHP 🐫
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, dom, gd
          tools: composer

      - name: Install dependencies 📦
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit 🧪
        run: vendor/bin/phpunit --colors=always

  package:
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - name: Check out code 🛒
        uses: actions/checkout@v6

      - name: Build package 🔧
        run: make build

      - name: Upload artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: pkg_crumb
          path: build/pkg_crumb.zip
          retention-days: 14
